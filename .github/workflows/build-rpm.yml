name: Build EasyTier GUI RPM

on:
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev rpm protobuf-compiler llvm clang

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Install project dependencies
        run: pnpm -r install

      # =================新增的关键编译步骤=================
      - name: Build local dependency libraries
        run: |
          cd tauri-plugin-vpnservice
          pnpm build
          cd ../easytier-web/frontend-lib
          pnpm build
      # ===============================================

      - name: Build Tauri App (RPM)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./easytier-gui
          args: --bundles rpm

      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytier-gui-rpm
          path: easytier-gui/src-tauri/target/release/bundle/rpm/*.rpm
